set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB,screen-256color:RGB,tmux-256color:RGB,xterm-kitty:RGB"

set -g mouse on
set -g history-limit 100000
set -sg escape-time 10
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'
bind c new-window -c '#{pane_current_path}'

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

set -g status-position bottom
set -g status-style "bg=default,fg=colour250"
set -g status-left-length 40
set -g status-right-length 80
set -g status-left "#[bold]#S "
set -g status-right "#{?client_prefix,#[reverse] PREFIX #[default] ,}#[dim]%Y-%m-%d %H:%M"

setw -g mode-keys vi
set -g set-clipboard on

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

setw -g automatic-rename on
set -g allow-rename off

set -g extended-keys on
set -g extended-keys-format csi-u
